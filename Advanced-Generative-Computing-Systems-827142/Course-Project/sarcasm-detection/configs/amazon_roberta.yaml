seed: 42

data:
  dataset_dir: data/processed/amazon
  text_column: text
  label_column: label
  max_length: 192
  prompt_template: |
    Review:
    {text}

    Judge whether the review is sarcastic.

model:
  name_or_path: roberta-base
  num_labels: 2

training:
  output_dir: runs/amazon-roberta
  learning_rate: 2.0e-5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  num_train_epochs: 4
  weight_decay: 0.01
  warmup_ratio: 0.06
  lr_scheduler_type: cosine
  label_smoothing_factor: 0.1
  metric_for_best_model: macro_f1
  greater_is_better: true
  evaluation_strategy: epoch
  save_strategy: epoch
  logging_steps: 50
  load_best_model_at_end: true
